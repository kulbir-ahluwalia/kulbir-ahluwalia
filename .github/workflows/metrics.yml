name: Metrics
on:
  # Schedule daily updates Let's run at midnight
  schedule: [{cron: "0 0 * * *"}]
  # Allow running manually from the Actions tab
  workflow_dispatch:
  # Run on every push to the default branch to keep it fresh
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # You'll need to create a Personal Access Token with `repo` and `read:user`
          # and save it as a repository secret named `METRICS_TOKEN`
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Options
          user: kulbir-ahluwalia
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Chicago
          
          # Lines of code plugin!
          plugin_lines: yes
          
          # Most used languages plugin
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook
          plugin_languages_limit: 8
